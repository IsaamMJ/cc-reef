      return `
        <div class="panel" style="margin-bottom:16px;">
          <p class="muted" style="margin:0;">LLM-proposed actions waiting for your approval. Nothing applies until you click ✓.</p>
        </div>
        <h3 style="margin-top:0;">Decision suggestions (${pendDecs.length})</h3>
        ${decsHtml}
        <h3 style="margin-top:24px;">Doc patches (${pendPatches.length})</h3>
        ${patchesHtml}
      `;
    },
    drifts: () => {
      const r = d.driftReport;
      const esc = s => String(s ?? '').replace(/</g,'&lt;');
      const header = `
        <div class="panel" style="margin-bottom:16px;">
          <p class="muted" style="margin:0 0 8px;">
            Drift checks compare structured claims in your TDD/PRD against the codebase.
            Embed a claim like:<br/>
            <code style="font-size:11px;">&lt;!-- @reef-claim<br/>description: ThyrocareService is the only caller of Thyrocare APIs<br/>pattern: thyrocare\\.(com|in)<br/>scope: src/modules/thyrocare/<br/>--&gt;</code>
          </p>
          <button id="runDrift">${r ? 'Re-run drift check' : 'Run drift check now'}</button>
          ${r ? `<span class="muted" style="margin-left:12px;">last run ${fmtTime(r.checkedAt)} · ${r.totals.ok} ok · ${r.totals.violations} violations · ${r.totals.errors} errors</span>` : ''}
        </div>
      `;
      if (!r || !r.results || r.results.length === 0) {
        return header + '<p class="muted">No claims found in scanned docs yet. Add a <code>@reef-claim</code> block to a TDD/PRD doc and run a check.</p>';
      }
      const cards = r.results.map(res => {
        const c = res.claim;
        const icon = res.status === 'ok' ? '🟢' : res.status === 'violation' ? '🔴' : '⚠️';
        const violations = (res.violations || []).slice(0, 25).map(v =>
          `<div style="font-size:12px;margin-top:4px;"><code>${esc(v.file)}:${v.line}</code> — ${esc(v.text)}</div>`
        ).join('');
        const more = (res.violations?.length ?? 0) > 25 ? `<div class="muted" style="font-size:11px;margin-top:4px;">… and ${res.violations.length - 25} more</div>` : '';
        return `
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:baseline;">
              <strong>${icon} ${esc(c.description)}</strong>
              <span class="muted" style="font-size:11px;">${esc(c.docPath)}${c.section ? ' · ' + esc(c.section) : ''}</span>
            </div>
            <div class="muted" style="font-size:11px;margin-top:4px;">
              pattern: <code>${esc(c.pattern)}</code>
              ${c.scope ? ' · scope: <code>' + esc(c.scope) + '</code>' : ''}
              ${c.forbidden ? ' · <span style="color:var(--red);">forbidden</span>' : ''}
            </div>
            ${res.errorMessage ? `<div style="color:var(--red);margin-top:6px;font-size:12px;">error: ${esc(res.errorMessage)}</div>` : ''}
            ${violations}
            ${more}
          </div>`;
      }).join('');
      return header + cards;
    },
    activity: () => `
      <div class="grid">
        <div class="panel"><h3>Heatmap (90d)</h3><div class="heatmap" id="phm"></div></div>
        <div class="panel"><h3>Top tools</h3><canvas id="ptools"></canvas></div>
        <div class="panel"><h3>Models</h3><canvas id="pmodels"></canvas></div>
      </div>`,
    sessions: () => `
      <div class="panel">
        <table>
          <thead><tr><th>When</th><th>Project</th><th>Turns</th><th>Tools</th><th>Model</th><th>Tokens</th></tr></thead>
          <tbody>${d.activity.sessions.map(s => `
            <tr>
              <td>${fmtTime(s.endedAt)}</td>
              <td>${s.project}</td>
              <td>${s.turns}</td>
              <td>${s.tools}</td>
              <td><code style="font-size:11px;">${s.model ?? '—'}</code></td>
              <td>${fmtNum(s.tokens)}</td>
            </tr>`).join('')}</tbody>
        </table>
      </div>`,
    company: () => `<div class="panel"><pre>${(d.companyContext ?? '').replace(/</g, '&lt;')}</pre></div>`,
  };
  function showTab(name) {
    $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    $('#tab-content').innerHTML = tabs[name]();
    if (name === 'docs') {
      const reader = $('#docsReader');
      const loadDoc = async (absPath, fileEl) => {
        $$('#docsTree .file').forEach(f => f.classList.remove('active'));
        if (fileEl) fileEl.classList.add('active');
        if (!reader) return;
        reader.innerHTML = '<div class="docs-reader-empty">Loading…</div>';
        try {
          const r = await api('/api/projects/' + encodeURIComponent(key) + '/doc?path=' + encodeURIComponent(absPath));
          const html = window.marked ? window.marked.parse(r.content || '') : ('<pre>' + (r.content||'').replace(/</g,'&lt;') + '</pre>');
          reader.innerHTML = `
            <div class="doc-meta">${(r.relPath||'').replace(/</g,'&lt;')} · ${(r.projectFolder||'').replace(/</g,'&lt;')}</div>
            ${html}
          `;
          reader.scrollTop = 0;
        } catch (e) {
          reader.innerHTML = '<div class="docs-reader-empty">Failed to load doc.</div>';
        }
      };

      // ---- Layout state (mirror of server) ----
      const layout = d.docLayout || { groups: [], unsorted: docs };
      // Build a mutable in-memory model of {groups: [{id,name,docs:[abs]}]}.
      let model = {
        groups: layout.groups.map(g => ({
          id: g.id, name: g.name, collapsed: g.collapsed === true,
          docs: g.docs.map(x => x.absolutePath),
        })),
      };
      const newId = () => 'g-' + Math.random().toString(36).slice(2, 8);
      const persist = async () => {
        try {
          const r = await api('/api/projects/' + encodeURIComponent(key) + '/doc-layout',
            { method: 'PUT', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ layout: model }) });
          // Re-render with server's pruned layout.
          if (r && r.docLayout) {
            d.docLayout = r.docLayout;
            renderProject(key);
          }
        } catch (e) { alert('Save failed: ' + (e && e.message ? e.message : e)); }
      };

      // ---- File card: click opens doc; ⋮ button or right-click opens group menu ----
      $$('#docsTree .file').forEach(f => {
        f.addEventListener('click', (ev) => {
          if (ev.target.closest('.fmove')) {
            ev.stopPropagation();
            showMoveMenu(f, f.dataset.docAbs);
            return;
          }
          loadDoc(f.dataset.docAbs, f);
        });
        f.addEventListener('contextmenu', (ev) => {
          ev.preventDefault();
          showMoveMenu(f, f.dataset.docAbs);
        });
        f.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter' || ev.key === ' ') {
            if (ev.target.closest('.fmove')) return;
            ev.preventDefault();
            loadDoc(f.dataset.docAbs, f);
          } else if (ev.key === 'm' || ev.key === 'M') {
            ev.preventDefault();
            showMoveMenu(f, f.dataset.docAbs);
          } else if (ev.key === 'ArrowDown' || ev.key === 'ArrowUp') {
            ev.preventDefault();
            const items = $$('#docsTree .file, #docsTree .group-head');
            const i = items.indexOf(f);
            const next = items[Math.max(0, Math.min(items.length - 1, i + (ev.key === 'ArrowDown' ? 1 : -1)))];
            if (next) next.focus();
          }
        });
      });
      const first = $('#docsTree .file');
      if (first) loadDoc(first.dataset.docAbs, first);

      // ---- Group head keyboard (Enter/Space toggles collapse, arrows navigate) ----
      $$('#docsTree .group-head').forEach(head => {
        head.addEventListener('keydown', (ev) => {
          const groupEl = head.closest('.group');
          if (!groupEl || groupEl.classList.contains('unsorted')) {
            // Still allow arrow nav from unsorted head.
          }
          if (ev.key === 'ArrowDown' || ev.key === 'ArrowUp') {
            ev.preventDefault();
            const items = $$('#docsTree .file, #docsTree .group-head');
            const i = items.indexOf(head);
            const next = items[Math.max(0, Math.min(items.length - 1, i + (ev.key === 'ArrowDown' ? 1 : -1)))];
            if (next) next.focus();
          } else if ((ev.key === 'Enter' || ev.key === ' ') && groupEl && !groupEl.classList.contains('unsorted')) {
            if (ev.target.closest('.gdel')) return;
            ev.preventDefault();
            const id = groupEl.dataset.groupId;
            const g = model.groups.find(x => x.id === id);
            if (g) { g.collapsed = !g.collapsed; persist(); }
          } else if (ev.key === 'ArrowRight' || ev.key === 'ArrowLeft') {
            if (!groupEl || groupEl.classList.contains('unsorted')) return;
            const id = groupEl.dataset.groupId;
            const g = model.groups.find(x => x.id === id);
            if (!g) return;
            const wantCollapsed = ev.key === 'ArrowLeft';
            if (g.collapsed !== wantCollapsed) {
              ev.preventDefault();
              g.collapsed = wantCollapsed;
              persist();
            }
          }
        });
      });

      function showMoveMenu(anchor, absPath) {
        document.querySelectorAll('.move-menu').forEach(m => m.remove());
        const menu = document.createElement('div');
        menu.className = 'move-menu';
        const rect = anchor.getBoundingClientRect();
        menu.style.left = rect.right + 4 + 'px';
        menu.style.top = rect.top + 'px';
        const items = [];
        // Audit this doc against the codebase via a fresh chat in Audit Mode.
        items.push({ label: '🔍 Audit this doc against the code', fn: () => startAuditChat(absPath) });
        items.push({ sep: true });
        for (const g of model.groups) items.push({ label: '→ ' + g.name, fn: () => moveDoc(absPath, g.id) });
        items.push({ label: '— Unsorted', fn: () => moveDoc(absPath, '__unsorted__') });
        items.push({ sep: true });
        items.push({ label: '+ New group from this doc', fn: async () => {
          const nm = prompt('New group name:');
          if (!nm) return;
          const id = newId();
          model.groups.push({ id, name: nm, collapsed: false, docs: [] });
          await moveDoc(absPath, id);
        }});
        menu.innerHTML = items.map(it => it.sep ? '<div class="sep"></div>' : `<div>${it.label.replace(/</g,'&lt;')}</div>`).join('');
        document.body.appendChild(menu);
        const handlers = items.filter(it => !it.sep);
        [...menu.querySelectorAll('div')].filter(el => !el.classList.contains('sep')).forEach((el, i) => {
          el.addEventListener('click', () => { menu.remove(); handlers[i].fn(); });
        });
        setTimeout(() => {
          const close = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', close); } };
          document.addEventListener('click', close);
        }, 0);
      }

      async function moveDoc(absPath, targetGroupId) {
        for (const g of model.groups) g.docs = g.docs.filter(p => p !== absPath);
        if (targetGroupId !== '__unsorted__') {
          const g = model.groups.find(x => x.id === targetGroupId);
          if (g) g.docs.push(absPath);
        }
        await persist();
      }

      async function startAuditChat(absPath) {
        const doc = (d.docs || []).find(x => x.absolutePath === absPath);
        if (!doc) { alert('Doc not found'); return; }
        const stem = (doc.relPath.split(/[/\\]/).pop() || '').replace(/\.md$/i, '');
        // Load the Audit preset for this specific doc.
        let preset = '';
        try {
          const r = await api('/api/projects/' + encodeURIComponent(key) + '/system-prompt/preset?preset=audit&doc=' + encodeURIComponent(stem));
          preset = (r && r.systemPrompt) || '';
        } catch {}
        if (!preset) { alert('Failed to load Audit preset'); return; }
        // Create a fresh chat seeded with the audit preset.
        const created = await api('/api/projects/' + encodeURIComponent(key) + '/chats',
          { method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ title: 'Audit · ' + stem }) });
        if (!created || !created.id) { alert('Failed to create chat'); return; }
        await api('/api/projects/' + encodeURIComponent(key) + '/chats/' + encodeURIComponent(created.id),
          { method: 'PATCH', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ systemPrompt: preset }) });
        // Switch to the Chat tab and load this session, then prefill + send.
        showTab('chat');
        // Wait a tick for chat tab init to finish, then activate the new session.
        setTimeout(async () => {
          chatState.activeId = created.id;
          // The chat tab loads sessions on init; reflect manually:
          const list = await api('/api/projects/' + encodeURIComponent(key) + '/chats');
          chatState.sessions = list.sessions || [];
          // Best effort: trigger a click on the new session in the rail.
          const railItem = document.querySelector('.chat-rail .session[data-id="' + created.id + '"]');
          if (railItem) railItem.click();
          // Prefill the textarea with the kickoff message.
          const inp = document.getElementById('chatInput');
          if (inp) {
            inp.value = 'Audit @' + stem + ' against the codebase. Follow the audit plan: extract claims, verify each with grep_code/read_file, then propose_task for every failure or unverifiable claim. Stop only after the final summary.';
            inp.focus();
          }
        }, 250);
      }

      // ---- Group head: rename, collapse, delete, drag ----
      $$('.gname[data-group-id]').forEach(el => {
        el.addEventListener('dblclick', () => {
          el.contentEditable = 'true';
          el.focus();
          document.getSelection().selectAllChildren(el);
        });
        el.addEventListener('blur', async () => {
          if (el.contentEditable !== 'true') return;
          el.contentEditable = 'false';
          const id = el.dataset.groupId;
          const g = model.groups.find(x => x.id === id);
          if (g) { g.name = el.textContent.trim() || 'Untitled'; await persist(); }
        });
        el.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') { ev.preventDefault(); el.blur(); }
          if (ev.key === 'Escape') { el.textContent = (model.groups.find(x => x.id === el.dataset.groupId) || {}).name || ''; el.blur(); }
        });
      });
      $$('#docsTree .group-head').forEach(el => el.addEventListener('click', async (ev) => {
        if (ev.target.closest('.gdel')) return;
        ev.stopPropagation();
        const id = el.closest('.group').dataset.groupId;
        const g = model.groups.find(x => x.id === id);
        if (g) { g.collapsed = !g.collapsed; await persist(); }
      }));
      $$('.gdel').forEach(el => el.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        const id = el.closest('.group').dataset.groupId;
        const g = model.groups.find(x => x.id === id);
        if (!g) return;
        if (g.docs.length > 0 && !confirm('Delete group "' + g.name + '"? Its ' + g.docs.length + ' doc(s) will go back to Unsorted.')) return;
        model.groups = model.groups.filter(x => x.id !== id);
        await persist();
      }));

      // ---- Add group ----
      const addBtn = $('#addGroupBtn');
      if (addBtn) addBtn.addEventListener('click', async () => {
        const nm = prompt('New group name:');
        if (!nm) return;
        model.groups.push({ id: newId(), name: nm, collapsed: false, docs: [] });
        await persist();
      });

      // ---- Drag-and-drop ----
      let dragKind = null;       // 'doc' | 'group'
      let dragPayload = null;    // absPath or groupId
      $$('#docsTree .file').forEach(f => {
        f.addEventListener('dragstart', (ev) => {
          dragKind = 'doc'; dragPayload = f.dataset.docAbs;
          f.classList.add('dragging');
          ev.dataTransfer.effectAllowed = 'move';
        });
        f.addEventListener('dragend', () => f.classList.remove('dragging'));
        f.addEventListener('dragover', (ev) => {
          if (dragKind !== 'doc') return;
          ev.preventDefault();
          const r = f.getBoundingClientRect();
          const above = (ev.clientY - r.top) < r.height / 2;
          f.classList.toggle('drop-above', above);
          f.classList.toggle('drop-below', !above);
        });
        f.addEventListener('dragleave', () => { f.classList.remove('drop-above','drop-below'); });
        f.addEventListener('drop', async (ev) => {
          if (dragKind !== 'doc') return;
          ev.preventDefault();
          const above = f.classList.contains('drop-above');
          f.classList.remove('drop-above','drop-below');
          const targetAbs = f.dataset.docAbs;
          if (targetAbs === dragPayload) return;
          const targetGroup = f.closest('.group');
          const targetId = targetGroup ? targetGroup.dataset.groupId : '__unsorted__';
          // Remove dragged from all groups, then insert at target position.
          for (const g of model.groups) g.docs = g.docs.filter(p => p !== dragPayload);
          if (targetId === '__unsorted__') {
            // Just leave it unplaced.
          } else {
            const g = model.groups.find(x => x.id === targetId);
            if (g) {
              const idx = g.docs.indexOf(targetAbs);
              const insertAt = above ? Math.max(0, idx) : idx + 1;
              g.docs.splice(insertAt, 0, dragPayload);
            }
          }
          await persist();
        });
      });
      // Drop onto an empty group body.
      $$('.group-body').forEach(body => {
        body.addEventListener('dragover', (ev) => {
          if (dragKind !== 'doc') return;
          ev.preventDefault();
          body.classList.add('drop-target');
        });
        body.addEventListener('dragleave', () => body.classList.remove('drop-target'));
        body.addEventListener('drop', async (ev) => {
          if (dragKind !== 'doc') return;
          ev.preventDefault();
          body.classList.remove('drop-target');
          const targetId = body.dataset.groupId;
          for (const g of model.groups) g.docs = g.docs.filter(p => p !== dragPayload);
          if (targetId !== '__unsorted__') {
            const g = model.groups.find(x => x.id === targetId);
            if (g) g.docs.push(dragPayload);
          }
          await persist();
        });
      });
      // Group head reordering.
      $$('.group-head').forEach(head => {
        const groupEl = head.closest('.group');
        if (!groupEl || groupEl.classList.contains('unsorted')) return;
        head.addEventListener('dragstart', (ev) => {
          dragKind = 'group'; dragPayload = groupEl.dataset.groupId;
          groupEl.classList.add('dragging');
          ev.dataTransfer.effectAllowed = 'move';
        });
        head.addEventListener('dragend', () => groupEl.classList.remove('dragging'));
      });
      $$('.group').forEach(g => {
        if (g.classList.contains('unsorted')) return;
        g.addEventListener('dragover', (ev) => {
          if (dragKind !== 'group') return;
          if (g.dataset.groupId === dragPayload) return;
          ev.preventDefault();
        });
        g.addEventListener('drop', async (ev) => {
          if (dragKind !== 'group') return;
          ev.preventDefault();
          const targetId = g.dataset.groupId;
          if (targetId === dragPayload) return;
          const fromIdx = model.groups.findIndex(x => x.id === dragPayload);
          const toIdx = model.groups.findIndex(x => x.id === targetId);
          if (fromIdx === -1 || toIdx === -1) return;
          const [moved] = model.groups.splice(fromIdx, 1);
          model.groups.splice(toIdx, 0, moved);
          await persist();
        });
      });
    }
    if (name === 'chat') {
      initChatTab(key, d);
    }
    if (name === 'alignment') {
      initAlignmentTab(key);
    }
    if (name === 'actionplan') {
      initActionPlanTab(key);
    }
    if (name === 'inbox') {
      const wireDec = (cls, action) => $$('.' + cls).forEach(b => b.addEventListener('click', async () => {
        await api('/api/projects/' + encodeURIComponent(key) + '/pending-decisions/' + encodeURIComponent(b.dataset.id),
          { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ action }) });
        renderProject(key);
      }));
      const wirePatch = (cls, action) => $$('.' + cls).forEach(b => b.addEventListener('click', async () => {
        await api('/api/projects/' + encodeURIComponent(key) + '/pending-patches/' + encodeURIComponent(b.dataset.id),
          { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ action }) });
        renderProject(key);
      }));
      wireDec('acceptDec', 'accept');
      wireDec('rejectDec', 'reject');
      wirePatch('applyPatch', 'apply');
      wirePatch('rejectPatch', 'reject');
    }
    if (name === 'drifts') {
      $('#runDrift')?.addEventListener('click', async () => {
        $('#runDrift').textContent = 'Running…';
        $('#runDrift').disabled = true;
        await api('/api/projects/' + encodeURIComponent(key) + '/drifts',
          { method: 'POST' });
        renderProject(key);
      });
    }
    if (name === 'decisions' && writable) {
      $('#addDec')?.addEventListener('click', async () => {
        const title = $('#decTitle')?.value?.trim() || undefined;
        const why = $('#decWhy')?.value?.trim() || undefined;
        const impact = $('#decImpact')?.value?.trim() || undefined;
        const refsRaw = $('#decRefs')?.value?.trim() || '';
        const refs = refsRaw ? refsRaw.split(',').map(s => s.trim()).filter(Boolean) : undefined;
        if (!title && !why && !impact && !(refs && refs.length)) return;
        await api('/api/projects/' + encodeURIComponent(key) + '/decisions',
          { method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ title, why, impact, refs }) });
        renderProject(key);
      });
    }
    if (name === 'activity') {
      const days = Object.entries(d.activity.heatmap).sort();
      const maxC = Math.max(1, ...days.map(([, c]) => c));
      $('#phm').innerHTML = days.map(([day, c]) => {
        const lvl = c === 0 ? 0 : c / maxC > 0.66 ? 4 : c / maxC > 0.33 ? 3 : c > 1 ? 2 : 1;
        return `<div class="day l${lvl}" title="${day}: ${c}"></div>`;
      }).join('');
      charts.ptools = new Chart($('#ptools'), {
        type: 'bar', data: { labels: d.activity.topTools.map(t => t.tool),
          datasets: [{ data: d.activity.topTools.map(t => t.count), backgroundColor: '#58a6ff' }] },
        options: { indexAxis: 'y', plugins: { legend: { display: false } },
          scales: { x: { ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--muted') } }, y: { ticks: { color: getComputedStyle(document.documentElement).getPropertyValue('--text') } } } }
      });
      charts.pmodels = new Chart($('#pmodels'), {
        type: 'doughnut', data: { labels: d.activity.models.map(m => m.model),
          datasets: [{ data: d.activity.models.map(m => m.count),
            backgroundColor: ['#58a6ff','#2ea043','#d29922','#a371f7'] }] },
        options: { plugins: { legend: { position: 'right', labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text') } } } }
      });
    }
  }
  $$('.tab').forEach(t => t.addEventListener('click', () => showTab(t.dataset.tab)));
  showTab('docs');
}

// ---------------- Knowledge search ----------------
async function renderKnowledge() {
  destroyCharts();
  const main = $('#main');
  main.innerHTML = `
    <h2>Knowledge</h2>
    <div class="muted">Search across all projects' scanned docs and decisions</div>
    <div class="panel" style="margin-top:16px;">
      <input type="search" id="kq" placeholder="auth, postgres, deployment, ..." />
    </div>
    <div id="kresults" style="margin-top:12px;"></div>
  `;
  const run = async () => {
    const q = $('#kq').value.trim();
    if (!q) { $('#kresults').innerHTML = ''; return; }
    const d = await api('/api/knowledge/search?q=' + encodeURIComponent(q));
    $('#kresults').innerHTML = d.results.length === 0
      ? '<p class="muted">No matches.</p>'
      : d.results.map(r => `
          <div class="search-result" data-key="${r.group}">
            <div class="meta">${r.displayName} · ${r.type} · ${r.ref}</div>
            <div>${r.preview.replace(/</g, '&lt;')}</div>
          </div>`).join('');
    $$('.search-result').forEach(s => s.addEventListener('click', () => {
      location.hash = '#/projects/' + encodeURIComponent(s.dataset.key);
    }));
  };
  $('#kq').addEventListener('input', run);
}

// ---------------- Decisions feed (cross-project) ----------------
async function renderDecisionsFeed() {
  const params = new URL(location.href.replace('#', '?'));
  const groupFilter = new URLSearchParams(location.hash.split('?')[1] || '').get('group') || '';
  const qs = groupFilter ? '?group=' + encodeURIComponent(groupFilter) : '';
  const [feed, projects] = await Promise.all([
    api('/api/decisions' + qs),
    api('/api/projects'),
  ]);
  const groups = (projects.groups || projects || []).map(p => ({ key: p.key, name: p.displayName || p.key }));
  const esc = s => String(s ?? '').replace(/</g,'&lt;');
  $('#main').innerHTML = `
    <h2 style="margin-top:8px;">Decisions Feed</h2>
    <div class="muted" style="margin-bottom:12px;">${feed.total} decisions across ${groups.length} groups</div>
    <div style="margin-bottom:16px;">
      <select id="grpFilter">
        <option value="">All projects</option>
        ${groups.map(g => `<option value="${esc(g.key)}" ${g.key === groupFilter ? 'selected' : ''}>${esc(g.name)}</option>`).join('')}
      </select>
    </div>
    ${feed.decisions.length === 0 ? '<p class="muted">No decisions logged yet. Claude logs decisions automatically via <code>reef_log_decision</code> during sessions.</p>' : ''}
    ${feed.decisions.map(e => {
      const head = e.title ? `<strong style="font-size:14px;">${esc(e.title)}</strong>` : '';
      const why = e.why ? `<div style="margin-top:6px;font-size:13px;"><span class="muted">Why:</span> ${esc(e.why)}</div>` : '';
      const impact = e.impact ? `<div style="margin-top:4px;font-size:13px;"><span class="muted">Impact:</span> ${esc(e.impact)}</div>` : '';
      const refs = (e.refs && e.refs.length) ? `<div style="margin-top:4px;font-size:12px;"><span class="muted">Refs:</span> ${e.refs.map(r => `<code style="font-size:11px;">${esc(r)}</code>`).join(' · ')}</div>` : '';
      const fallback = (!e.title && !e.why && !e.impact) ? `<div class="body" style="margin-top:4px;">${esc(e.body)}</div>` : '';
      return `
        <div class="card" style="cursor:pointer;" data-key="${esc(e.group)}">
          <div class="date" style="display:flex;justify-content:space-between;">
            <span>${esc(e.date || '—')} · <span style="color:var(--accent);">${esc(e.groupDisplayName || e.group)}</span></span>
            ${e.source === 'md' ? '<span class="muted" style="font-size:10px;">legacy</span>' : ''}
          </div>
          ${head}${why}${impact}${refs}${fallback}
        </div>`;
    }).join('')}
  `;
  $('#grpFilter').addEventListener('change', e => {
    location.hash = e.target.value ? '#/decisions?group=' + encodeURIComponent(e.target.value) : '#/decisions';
  });
  $$('.card[data-key]').forEach(c => c.addEventListener('click', () => {
    location.hash = '#/projects/' + encodeURIComponent(c.dataset.key);
  }));
}

// ---------------- AI Spend ----------------
async function renderSpend() {
  const days = 30;
  const d = await api('/api/spend?days=' + days);
  const esc = s => String(s ?? '').replace(/</g,'&lt;');
  const fmtUsd = n => '$' + (Number(n) || 0).toFixed(4);
  const provider = d.provider || 'none';
  const status = d.llmAvailable
    ? `<span style="color:var(--green);">● ${esc(provider)} active</span>`
    : `<span style="color:var(--red);">● no provider</span> — set <code>XAI_API_KEY</code>, <code>NIM_API_KEY</code>, or <code>OPENAI_API_KEY</code>`;
  $('#main').innerHTML = `
    <h2 style="margin-top:8px;">AI Spend (last ${days}d)</h2>
    <div class="muted" style="margin-bottom:16px;">${status}</div>
    <div class="grid">
      <div class="panel"><h3>Total cost</h3><div style="font-size:32px;font-weight:600;">${fmtUsd(d.totalUsd)}</div><div class="muted">${d.totalCalls} calls · ${(d.totalInputTokens||0).toLocaleString()} in / ${(d.totalOutputTokens||0).toLocaleString()} out</div></div>
      <div class="panel"><h3>By provider</h3>${(d.byProvider||[]).length === 0 ? '<p class="muted">No calls yet.</p>' : `<table><thead><tr><th>Provider</th><th>Calls</th><th>Cost</th></tr></thead><tbody>${d.byProvider.map(r => `<tr><td>${esc(r.provider)}</td><td>${r.calls}</td><td>${fmtUsd(r.usd)}</td></tr>`).join('')}</tbody></table>`}</div>
      <div class="panel"><h3>By purpose</h3>${(d.byPurpose||[]).length === 0 ? '<p class="muted">No calls yet.</p>' : `<table><thead><tr><th>Purpose</th><th>Calls</th><th>Cost</th></tr></thead><tbody>${d.byPurpose.map(r => `<tr><td>${esc(r.purpose)}</td><td>${r.calls}</td><td>${fmtUsd(r.usd)}</td></tr>`).join('')}</tbody></table>`}</div>
      <div class="panel"><h3>By model</h3>${(d.byModel||[]).length === 0 ? '<p class="muted">No calls yet.</p>' : `<table><thead><tr><th>Model</th><th>Calls</th><th>Cost</th></tr></thead><tbody>${d.byModel.map(r => `<tr><td><code>${esc(r.model)}</code></td><td>${r.calls}</td><td>${fmtUsd(r.usd)}</td></tr>`).join('')}</tbody></table>`}</div>
    </div>
    <div class="panel" style="margin-top:16px;">
      <h3>Recent calls</h3>
      ${(d.recent||[]).length === 0 ? '<p class="muted">No LLM calls yet. They will appear here once features like drift detection, claim extraction, or decision suggestions run.</p>' : `<table><thead><tr><th>When</th><th>Provider</th><th>Model</th><th>Purpose</th><th>In</th><th>Out</th><th>Cost</th><th>Group</th></tr></thead><tbody>${d.recent.map(r => `<tr><td>${fmtTime(r.startedAt)}</td><td>${esc(r.provider)}</td><td><code style="font-size:11px;">${esc(r.model)}</code></td><td>${esc(r.purpose)}</td><td>${r.inputTokens}</td><td>${r.outputTokens}</td><td>${fmtUsd(r.costUsd)}</td><td>${esc(r.group||'—')}</td></tr>`).join('')}</tbody></table>`}
    </div>
  `;
}

// ---------------- Router ----------------
function route() {
  const h = location.hash || '#/overview';
  $$('#nav a').forEach(a => a.classList.toggle('active',
    h === '#/' + a.dataset.route || h.startsWith('#/' + a.dataset.route + '/') || h.startsWith('#/' + a.dataset.route + '?')));
  if (h === '#/overview' || h === '#/' || h === '') return renderOverview();
  if (h === '#/projects') return renderProjectsList();
  const m = h.match(/^#\/projects\/(.+)$/);
  if (m) return renderProject(decodeURIComponent(m[1]));
  if (h.startsWith('#/decisions')) return renderDecisionsFeed();
  if (h === '#/spend' || h.startsWith('#/spend')) return renderSpend();
  if (h === '#/knowledge') return renderKnowledge();
}
window.addEventListener('hashchange', route);
route();
</script>
